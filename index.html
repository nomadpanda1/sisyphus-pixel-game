<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西西弗斯：泰拉瑞亚纪元 | Terraria Sisyphus</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; user-select: none; font-family: "Courier New", monospace; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; cursor: none; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 20px; box-sizing: border-box; }
        
        /* 泰拉瑞亚风格 UI */
        .hud-top { display: flex; justify-content: space-between; }
        .score-board { font-size: 1.5rem; color: #fff; text-shadow: 2px 2px 0 #000; font-weight: bold; }
        .energy-container { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .energy-star { width: 20px; height: 20px; background: #FFD700; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); box-shadow: 0 0 10px #FFD700; transition: transform 0.2s; }
        .energy-star.empty { background: #333; box-shadow: inset 2px 2px 5px #000; }
        
        .controls { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #fff; text-shadow: 1px 1px 0 #000; font-size: 0.9rem; }
        #message-box { position: absolute; top: 30%; width: 100%; text-align: center; color: #FFF; font-size: 2rem; font-weight: bold; text-shadow: 3px 3px 0 #000; opacity: 0; transition: opacity 0.5s; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div class="score-board">轮回: <span id="score">0</span></div>
            <div class="energy-container" id="energy-bar">
                </div>
        </div>
        <div id="message-box"></div>
        <div class="controls">长按 [W] 推石 | 碾压发光蘑菇回体 | 躲避史莱姆</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // 渲染分辨率 640x360，泰拉瑞亚标准 16x16 Tile
    const VW = 640; const VH = 360; const TILE = 16;
    const buffer = document.createElement('canvas');
    buffer.width = VW; buffer.height = VH;
    const bctx = buffer.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resize); resize();

    // --- 1. 程序化材质烘焙系统 (Texture Generator) ---
    const textures = {};
    function bakeTexture(name, baseColor, noiseColors, density) {
        let c = document.createElement('canvas'); c.width = TILE; c.height = TILE;
        let x = c.getContext('2d');
        x.fillStyle = baseColor; x.fillRect(0,0,TILE,TILE);
        for(let i=0; i<density; i++) {
            x.fillStyle = noiseColors[Math.floor(Math.random()*noiseColors.length)];
            x.fillRect(Math.floor(Math.random()*TILE), Math.floor(Math.random()*TILE), 1, 1);
        }
        textures[name] = c;
    }
    // 生成各种方块材质
    bakeTexture('dirt', '#593e26', ['#4a331f', '#3b2818', '#6b4b2e'], 60);
    bakeTexture('stone', '#5c636a', ['#4b5157', '#6b737a', '#3a3e42'], 100);
    bakeTexture('grass', '#37823b', ['#47a34c', '#2c6b2f'], 40);
    bakeTexture('oreBlue', '#5c636a', ['#00f3ff', '#ffffff'], 30); // 蓝宝石矿
    bakeTexture('oreRed', '#5c636a', ['#ff003c', '#ff7b93'], 30); // 红宝石矿
    bakeTexture('wood', '#5c3e29', ['#4a301f'], 50);

    // 特殊：带草皮的泥土
    const grassBlock = document.createElement('canvas'); grassBlock.width=TILE; grassBlock.height=TILE;
    let gx = grassBlock.getContext('2d');
    gx.drawImage(textures['dirt'], 0, 0);
    gx.drawImage(textures['grass'], 0, 0, TILE, 4); // 顶部4像素为草
    for(let i=0; i<10; i++) { // 垂下来的草须
        gx.fillStyle = '#37823b';
        gx.fillRect(Math.random()*TILE, 4, 1, Math.random()*3);
    }
    textures['grassBlock'] = grassBlock;

    // --- 2. 世界生成器 (World Gen) ---
    const MAP_W = Math.ceil(VW / TILE) + 10;
    const MAP_H = Math.ceil(VH / TILE);
    const world = [];
    
    // 生成阶梯形斜坡与地下世界
    for(let x=0; x<MAP_W; x++) {
        world[x] = [];
        // 斜坡高度函数 (左低右高)
        let surfaceY = Math.floor(MAP_H * 0.8) - Math.floor(x * 0.4); 
        for(let y=0; y<MAP_H; y++) {
            if(y < surfaceY) world[x][y] = 'air';
            else if(y === surfaceY) world[x][y] = 'grassBlock';
            else if(y < surfaceY + 4 + Math.random()*2) world[x][y] = 'dirt';
            else {
                // 石层与矿石生成
                let rand = Math.random();
                if(rand < 0.02) world[x][y] = 'oreBlue';
                else if(rand < 0.04) world[x][y] = 'oreRed';
                else world[x][y] = 'stone';
            }
            // 随机生成洞穴 (简单 Cellular Automata 思想)
            if(y > surfaceY + 3 && Math.random() < 0.1) world[x][y] = 'air';
        }
    }

    // --- 3. 游戏对象与物理实体 ---
    const GAME = {
        tick: 0, dayTime: 0, score: 0,
        energy: 100, maxEnergy: 100, exhausted: false,
        stoneX: 50, stoneV: 0, pushForce: 0.08, gravity: 0.04, friction: 0.85
    };

    let inputs = { push: false };
    window.addEventListener('keydown', e => { if(e.key==='w'||e.key==='W'||e.key==='ArrowUp') inputs.push = true; });
    window.addEventListener('keyup', e => { if(e.key==='w'||e.key==='W'||e.key==='ArrowUp') inputs.push = false; });
    window.addEventListener('mousedown', () => inputs.push = true);
    window.addEventListener('mouseup', () => inputs.push = false);

    // 动态实体列表 (发光蘑菇, 史莱姆)
    let entities = [];
    function spawnEntity() {
        if(Math.random() < 0.02 && entities.length < 5) {
            let type = Math.random() > 0.5 ? 'shroom' : 'slime';
            let ex = GAME.stoneX + 100 + Math.random()*200; // 在前方生成
            if(ex > (MAP_W-5)*TILE) return;
            entities.push({ x: ex, type: type, y: getSurfaceY(ex), active: true, frame: 0 });
        }
    }

    let particles = [];
    function spawnDust(x, y, color) {
        particles.push({x, y, vx: (Math.random()-0.5)*2, vy: -Math.random()*2, life: 1, color});
    }

    // --- 4. 核心逻辑 ---
    function getSurfaceY(px) {
        let tx = Math.floor(px / TILE);
        if(tx < 0 || tx >= MAP_W) return VH;
        for(let y=0; y<MAP_H; y++) if(world[tx][y] !== 'air') return y * TILE;
        return VH;
    }

    function updateUI() {
        document.getElementById('score').innerText = GAME.score;
        let energyHtml = '';
        let stars = Math.ceil(GAME.energy / 20); // 5颗星代表100体力
        for(let i=0; i<5; i++) {
            energyHtml += `<div class="energy-star ${i >= stars ? 'empty' : ''}"></div>`;
        }
        document.getElementById('energy-bar').innerHTML = energyHtml;
    }

    function showMessage(text) {
        let el = document.getElementById('message-box');
        el.innerText = text; el.style.opacity = 1;
        setTimeout(() => { el.style.opacity = 0; }, 2000);
    }

    function updatePhysics() {
        GAME.tick++;
        GAME.dayTime = (GAME.tick % 2000) / 2000; // 昼夜交替
        
        spawnEntity();

        // 实体逻辑 (蘑菇/史莱姆)
        entities.forEach(ent => {
            if(!ent.active) return;
            ent.y = getSurfaceY(ent.x);
            if(ent.type === 'slime') {
                ent.x -= 0.5; // 史莱姆向左弹跳
                ent.frame += 0.1;
                ent.y -= Math.abs(Math.sin(ent.frame)) * 10;
            }
            
            // 碰撞检测 (石头撞击)
            if(Math.abs(ent.x - GAME.stoneX) < 20) {
                ent.active = false;
                for(let i=0; i<10; i++) spawnDust(ent.x, ent.y, ent.type==='shroom'?'#00f3ff':'#0055ff');
                if(ent.type === 'shroom') {
                    GAME.energy = Math.min(100, GAME.energy + 30);
                    showMessage("+ 体力恢复 !");
                } else if(ent.type === 'slime') {
                    GAME.energy = Math.max(0, GAME.energy - 40);
                    GAME.stoneV -= 2; // 击退
                    showMessage("- 受到阻碍 !");
                }
            }
        });
        entities = entities.filter(e => e.active);

        // 体力系统
        if(GAME.energy <= 0 && !GAME.exhausted) {
            GAME.exhausted = true; showMessage("脱力...");
        }
        if(GAME.exhausted && GAME.energy > 50) GAME.exhausted = false; // 恢复一半后解除虚弱

        let isPushing = inputs.push && !GAME.exhausted;

        // 推石逻辑
        if(isPushing) {
            GAME.stoneV += GAME.pushForce;
            GAME.energy -= 0.2; // 耗费体力
            if(Math.random()>0.8) spawnDust(GAME.stoneX, getSurfaceY(GAME.stoneX), '#593e26');
        } else {
            GAME.stoneV -= GAME.gravity;
            if(GAME.energy < 100) GAME.energy += 0.15; // 缓慢恢复
        }

        GAME.stoneV *= GAME.friction;
        GAME.stoneX += GAME.stoneV;

        if(GAME.stoneX < 50) { GAME.stoneX = 50; GAME.stoneV = 0; }

        // 登顶逻辑
        if(GAME.stoneX > (MAP_W-5)*TILE) {
            GAME.score++;
            GAME.stoneX = 50; // 重置
            GAME.energy = 100;
            GAME.exhausted = false;
            showMessage("历劫完成，轮回继续");
        }

        // 粒子更新
        particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.05; });
        particles = particles.filter(p => p.life > 0);

        updateUI();
    }

    // --- 5. 渲染系统 (Render) ---
    function draw() {
        updatePhysics();
        bctx.clearRect(0, 0, VW, VH);

        // 1. 动态天空与视差背景
        let isNight = GAME.dayTime > 0.5;
        let skyGradient = bctx.createLinearGradient(0,0,0,VH);
        if(!isNight) { skyGradient.addColorStop(0, '#87CEEB'); skyGradient.addColorStop(1, '#e0f6ff'); }
        else { skyGradient.addColorStop(0, '#0a0a1a'); skyGradient.addColorStop(1, '#1a1a3a'); }
        bctx.fillStyle = skyGradient; bctx.fillRect(0,0,VW,VH);

        // 星星
        if(isNight) {
            bctx.fillStyle = '#fff';
            for(let i=0; i<30; i++) bctx.fillRect((i*47 + GAME.tick*0.1)%VW, (i*31)%150, 1, 1);
        }

        // 远山
        bctx.fillStyle = isNight ? '#111' : '#8cb07a';
        bctx.beginPath(); bctx.moveTo(0, VH);
        for(let x=0; x<=VW; x+=20) bctx.lineTo(x, 200 + Math.sin(x*0.01)*40);
        bctx.lineTo(VW, VH); bctx.fill();

        // 2. 世界方块渲染 (地核与地表)
        for(let x=0; x<MAP_W; x++) {
            for(let y=0; y<MAP_H; y++) {
                let block = world[x][y];
                if(block !== 'air' && textures[block]) {
                    bctx.drawImage(textures[block], x*TILE, y*TILE);
                }
            }
        }

        // 3. 实体与粒子渲染
        entities.forEach(ent => {
            if(ent.type === 'shroom') {
                bctx.fillStyle = '#fff'; bctx.fillRect(ent.x, ent.y-4, 4, 4); // 梗
                bctx.fillStyle = '#00f3ff'; bctx.fillRect(ent.x-3, ent.y-8, 10, 4); // 伞盖
            } else if(ent.type === 'slime') {
                bctx.fillStyle = 'rgba(0, 100, 255, 0.8)';
                bctx.fillRect(ent.x-6, ent.y-8, 12, 8); // 史莱姆本体
                bctx.fillStyle = '#fff'; bctx.fillRect(ent.x-3, ent.y-6, 2, 2); bctx.fillRect(ent.x+1, ent.y-6, 2, 2); // 眼睛
            }
        });

        particles.forEach(p => {
            bctx.fillStyle = p.color; bctx.fillRect(p.x, p.y, 2, 2);
        });

        // 4. 角色与石头渲染
        let stoneY = getSurfaceY(GAME.stoneX) - 16;
        bctx.save();
        bctx.translate(GAME.stoneX, stoneY);
        bctx.rotate(GAME.stoneX * 0.1);
        // 画一个粗糙的像素圆石头
        bctx.fillStyle = '#7a8287';
        bctx.beginPath(); bctx.arc(0,0, 14, 0, Math.PI*2); bctx.fill();
        bctx.fillStyle = '#5c636a'; bctx.fillRect(-5,-5, 4,4); bctx.fillRect(2,3, 5,5);
        bctx.restore();

        // 西西弗斯 (极其简约的像素小人)
        let px = GAME.stoneX - 16; let py = getSurfaceY(px) - 16;
        let walkY = (inputs.push && !GAME.exhausted) ? Math.sin(GAME.tick*0.3)*2 : 0;
        bctx.fillStyle = GAME.exhausted ? '#888' : '#8bb5ba'; bctx.fillRect(px-4, py+walkY, 8, 10); // 衣服
        bctx.fillStyle = '#755841'; bctx.fillRect(px-4, py+10, 3, 6); bctx.fillRect(px+1, py+10, 3, 6); // 裤子
        bctx.fillStyle = '#f5d6b3'; bctx.fillRect(px-3, py-6+walkY, 6, 6); // 头
        bctx.fillRect(px, py+2+walkY, 8, 2); // 伸出的手
        if(GAME.exhausted) { bctx.fillStyle='#00f3ff'; bctx.fillRect(px+3, py-4, 1, 1); } // 流汗

        // 5. 泰拉瑞亚级动态光影合成 (Dynamic Lighting)
        if(isNight) {
            const lightCanvas = document.createElement('canvas'); lightCanvas.width = VW; lightCanvas.height = VH;
            const lctx = lightCanvas.getContext('2d');
            // 全局黑暗笼罩
            lctx.fillStyle = 'rgba(5, 5, 20, 0.85)'; lctx.fillRect(0,0,VW,VH);
            
            // 挖除黑暗 (合成发光)
            lctx.globalCompositeOperation = 'destination-out';
            
            function drawLight(lx, ly, radius, intensity) {
                let grad = lctx.createRadialGradient(lx, ly, 0, lx, ly, radius);
                grad.addColorStop(0, `rgba(255,255,255,${intensity})`);
                grad.addColorStop(1, 'rgba(255,255,255,0)');
                lctx.fillStyle = grad; lctx.beginPath(); lctx.arc(lx, ly, radius, 0, Math.PI*2); lctx.fill();
            }

            // 玩家光环
            drawLight(px, py, 60, 1);
            // 实体发光 (蘑菇/史莱姆)
            entities.forEach(e => { if(e.type === 'shroom') drawLight(e.x, e.y, 40, 0.8); });
            // 地下矿石发光
            for(let x=0; x<MAP_W; x++) {
                for(let y=0; y<MAP_H; y++) {
                    if(world[x][y] === 'oreBlue') drawLight(x*TILE+8, y*TILE+8, 30, 0.6);
                    if(world[x][y] === 'oreRed') drawLight(x*TILE+8, y*TILE+8, 20, 0.4);
                }
            }
            
            // 将光影层覆盖到主缓冲
            bctx.globalCompositeOperation = 'source-over';
            bctx.drawImage(lightCanvas, 0, 0);
        }

        // 放大渲染到屏幕
        ctx.clearRect(0,0, canvas.width, canvas.height);
        ctx.drawImage(buffer, 0, 0, canvas.width, canvas.height);
        requestAnimationFrame(draw);
    }
    
    draw();
</script>
</body>
</html>
